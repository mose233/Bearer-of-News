<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>xnewsapp.com | AI Creator Studio</title>

    <meta
      name="description"
      content="Create viral-ready AI videos, images, audio, and publish directly to your Facebook Page."
    />

    <meta name="theme-color" content="#7C3AED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="xnewsapp.com" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta property="og:title" content="xnewsapp.com | AI Creator Studio" />

    <meta
      property="og:description"
      content="Generate stunning AI videos, images, voiceovers, music, and campaign content in minutes."
    />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:description"
      content="Generate stunning AI videos, images, voiceovers, music, and campaign content in minutes."
    />
    <meta name="twitter:image" content="/og.jpg" />
  </head>

  <body>
    <div id="root"></div>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((error) => {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
